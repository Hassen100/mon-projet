<div class="login-container">
  <div class="login-card">
    <h2 *ngIf="isLoginMode">🔐 Connexion Dashboard SEO</h2>
    <h2 *ngIf="!isLoginMode">📝 Inscription Dashboard SEO</h2>
    
    <!-- Formulaire de Connexion -->
    <form *ngIf="isLoginMode" (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email" 
          required 
          placeholder="votre@email.com"
          class="form-control"
        >
      </div>
      
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="password" 
          required 
          placeholder="•••••••"
          class="form-control"
        >
      </div>
      
      <button 
        type="submit" 
        [disabled]="loading || !email || !password"
        class="btn btn-primary"
      >
        <span *ngIf="loading">🔄 Connexion...</span>
        <span *ngIf="!loading">🚀 Se connecter</span>
      </button>
    </form>

    <!-- Formulaire d'Inscription -->
    <form *ngIf="!isLoginMode" (ngSubmit)="signUp()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email" 
          required 
          placeholder="votre@email.com"
          class="form-control"
        >
      </div>

      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input 
          type="text" 
          id="username" 
          name="username"
          [(ngModel)]="username" 
          required 
          placeholder="pseudo123"
          class="form-control"
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="first_name">Prénom</label>
          <input 
            type="text" 
            id="first_name" 
            name="first_name"
            [(ngModel)]="first_name" 
            required 
            placeholder="Jean"
            class="form-control"
          >
        </div>

        <div class="form-group">
          <label for="last_name">Nom</label>
          <input 
            type="text" 
            id="last_name" 
            name="last_name"
            [(ngModel)]="last_name" 
            required 
            placeholder="Dupont"
            class="form-control"
          >
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="password" 
          required 
          placeholder="••••••"
          class="form-control"
        >
      </div>
      
      <button 
        type="submit" 
        [disabled]="loading || !email || !username || !first_name || !last_name || !password"
        class="btn btn-primary"
      >
        <span *ngIf="loading">🔄 Inscription...</span>
        <span *ngIf="!loading">📝 Créer un compte</span>
      </button>
    </form>
    
    <!-- Bouton de basculement -->
    <div class="toggle-section">
      <p *ngIf="isLoginMode">Pas encore de compte ?</p>
      <p *ngIf="!isLoginMode">Déjà un compte ?</p>
      <button 
        (click)="toggleMode()" 
        [disabled]="loading"
        class="btn btn-secondary"
      >
        <span *ngIf="isLoginMode">📝 Créer un compte</span>
        <span *ngIf="!isLoginMode">🔐 Se connecter</span>
      </button>
    </div>
  </div>
</div>
