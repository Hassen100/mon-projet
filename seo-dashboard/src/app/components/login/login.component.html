<div class="login-container">
  <section class="login-panel">
    <div class="login-card-intro">
      <span class="eyebrow">Connexion securisee</span>
      <h3>Accedez a votre espace SEO</h3>
      <p>Retrouvez vos analyses, vos KPIs et vos utilisateurs connectes depuis une seule interface.</p>
    </div>

    <div class="login-card">
      <div class="alert" *ngIf="alertMessage" [ngClass]="alertType">
        {{ alertMessage }}
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="demo@seopulse.com"
            [(ngModel)]="email"
            required
          />
          <div class="field-error" *ngIf="emailError">{{ emailError }}</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="password-field">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              class="form-input password-input"
              placeholder="********"
              [(ngModel)]="password"
              required
            />
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility('login')">{{ showPassword ? '🙈' : '👁️' }}</button>
          </div>
          <div class="field-error" *ngIf="passwordError">{{ passwordError }}</div>
        </div>

        <div class="remember-section">
          <div class="checkbox-group">
            <input type="checkbox" id="remember" name="remember" class="checkbox-input" [(ngModel)]="remember">
            <label for="remember" class="checkbox-label">Se souvenir de moi</label>
          </div>
          <a href="#" class="forgot-link" (click)="onForgotPassword(); $event.preventDefault()">Mot de passe oublie ?</a>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading">
          <span class="btn-text" *ngIf="!isLoading">Se connecter</span>
          <div class="loading" *ngIf="isLoading"></div>
        </button>

        <div class="divider">
          <span>ou</span>
        </div>

        <button type="button" class="create-account-btn" (click)="openRegisterModal()">
          Creer un compte
        </button>
      </form>
    </div>
  </section>

  <div class="modal-overlay" [class.active]="showModal" (click)="closeRegisterModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Creer un compte</h3>
        <button type="button" class="modal-close" (click)="closeRegisterModal()">&times;</button>
      </div>

      <form (ngSubmit)="onRegister()">
        <div class="form-group">
          <label class="form-label" for="register-name">Nom complet</label>
          <input
            type="text"
            id="register-name"
            name="registerName"
            class="form-input"
            placeholder="Jean Dupont"
            [(ngModel)]="registerName"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            name="registerEmail"
            class="form-input"
            placeholder="votre@email.com"
            [(ngModel)]="registerEmail"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="register-company">Entreprise (optionnel)</label>
          <input
            type="text"
            id="register-company"
            name="registerCompany"
            class="form-input"
            placeholder="Votre entreprise"
            [(ngModel)]="registerCompany"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password">Mot de passe</label>
          <div class="password-field">
            <input
              [type]="showRegisterPassword ? 'text' : 'password'"
              id="register-password"
              name="registerPassword"
              class="form-input password-input"
              placeholder="********"
              [(ngModel)]="registerPassword"
              required
            />
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility('register')">{{ showRegisterPassword ? '🙈' : '👁️' }}</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-confirm">Confirmer le mot de passe</label>
          <div class="password-field">
            <input
              [type]="showRegisterConfirm ? 'text' : 'password'"
              id="register-confirm"
              name="registerConfirm"
              class="form-input password-input"
              placeholder="********"
              [(ngModel)]="registerConfirm"
              required
            />
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility('confirm')">{{ showRegisterConfirm ? '🙈' : '👁️' }}</button>
          </div>
        </div>

        <div class="terms-section">
          <div class="checkbox-group">
            <input type="checkbox" id="terms" name="acceptTerms" class="checkbox-input" [(ngModel)]="acceptTerms" required>
            <label for="terms" class="checkbox-label">
              J'accepte les <a href="#" class="terms-link" (click)="$event.preventDefault()">conditions d'utilisation</a> et la <a href="#" class="terms-link" (click)="$event.preventDefault()">politique de confidentialite</a>
            </label>
          </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading">
          <span class="btn-text" *ngIf="!isLoading">Creer mon compte</span>
          <div class="loading" *ngIf="isLoading"></div>
        </button>
      </form>
    </div>
  </div>

  <div class="login-footer">
    <p>&copy; 2026 SEO Pulse Board | Frontend Demo</p>
  </div>
</div>
