<!DOCTYPE html>
<html>
<head>
    <title>Debug Auth Supabase</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test Authentification Supabase</h1>
    
    <div>
        <h2>Test de connexion</h2>
        <input type="email" id="email" placeholder="Email" value="test@test.com" style="width: 300px; padding: 10px; margin: 5px;"><br>
        <input type="password" id="password" placeholder="Password" value="123456" style="width: 300px; padding: 10px; margin: 5px;"><br>
        <button onclick="testLogin()" style="padding: 10px 20px; margin: 5px;">Se connecter</button>
        <button onclick="testSignup()" style="padding: 10px 20px; margin: 5px;">Créer compte</button>
    </div>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
        const supabaseUrl = 'https://tmehgvdakyaekvhltsly.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtZWhndmRha3lhZWt2aGx0c2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjIwMDAwMDAsImV4cCI6MjAzNzU3NjAwMH0.example';
        
        const supabase = createClient(supabaseUrl, supabaseKey);
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<p>🔄 Test de connexion...</p>';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                console.log('Login result:', { data, error });
                
                if (error) {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Erreur: ${error.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: green;">✅ Connexion réussie!</p><p>Session: ${JSON.stringify(data.session, null, 2)}</p>`;
                }
            } catch (err) {
                console.error('Unexpected error:', err);
                resultDiv.innerHTML = `<p style="color: red;">❌ Erreur inattendue: ${err.message}</p>`;
            }
        }
        
        async function testSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<p>🔄 Création du compte...</p>';
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                console.log('Signup result:', { data, error });
                
                if (error) {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Erreur: ${error.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: green;">✅ Compte créé!</p><p>Data: ${JSON.stringify(data, null, 2)}</p>`;
                }
            } catch (err) {
                console.error('Unexpected error:', err);
                resultDiv.innerHTML = `<p style="color: red;">❌ Erreur inattendue: ${err.message}</p>`;
            }
        }
        
        // Vérifier la session actuelle
        async function checkSession() {
            const { data, error } = await supabase.auth.getSession();
            console.log('Current session:', { data, error });
            
            if (data.session) {
                document.getElementById('result').innerHTML = `<p style="color: blue;">📱 Session active: ${data.session.user.email}</p>`;
            }
        }
        
        // Écouter les changements d'auth
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', { event, session });
            document.getElementById('result').innerHTML += `<p style="color: orange;">🔄 Auth change: ${event}</p>`;
        });
        
        // Vérifier la session au chargement
        checkSession();
    </script>
</body>
</html>
