<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creer un compte admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e8f5f7 0%, #f7fbfc 100%);
      color: #16313a;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #cfe3e8;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(34, 73, 84, 0.12);
      overflow: hidden;
    }
    .card-header {
      padding: 24px 28px;
      background: linear-gradient(135deg, #2c7083, #3d8ba0);
      color: #fff;
    }
    .card-header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .card-header p {
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.5;
    }
    .card-body {
      padding: 28px;
    }
    .notice {
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 15px;
      line-height: 1.5;
    }
    .notice.error {
      background: #fff1ef;
      border: 1px solid #ffb8ac;
      color: #b9321d;
    }
    .notice.success {
      background: #eefbf2;
      border: 1px solid #a7e0b6;
      color: #1d7a37;
    }
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #c9d9dd;
      border-radius: 12px;
      font-size: 15px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #3d8ba0;
      box-shadow: 0 0 0 4px rgba(61, 139, 160, 0.12);
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }
    button, .link {
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button {
      background: linear-gradient(135deg, #2d7f94, #45a0b7);
      color: #fff;
    }
    .link {
      background: #edf5f7;
      color: #285969;
    }
    .helper {
      margin-top: 18px;
      font-size: 14px;
      color: #59757e;
      line-height: 1.5;
    }
    code {
      background: #edf5f7;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1>Creer un admin</h1>
        <p>Page temporaire pour creer un superuser Django sans commande.</p>
      </div>
      <div class="card-body">
        {% if error %}
          <div class="notice error">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="notice success">{{ success }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="field">
            <label for="username">Nom d utilisateur</label>
            <input id="username" name="username" type="text" value="{{ username }}" placeholder="ghazi@gmail.com" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ email }}" placeholder="ghazi@gmail.com" required>
          </div>
          <div class="field">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required>
          </div>
          <div class="field">
            <label for="confirm_password">Confirmer le mot de passe</label>
            <input id="confirm_password" name="confirm_password" type="password" required>
          </div>
          <div class="actions">
            <button type="submit">Creer le superuser</button>
            <a class="link" href="/admin/">Aller vers /admin/</a>
          </div>
        </form>

        <p class="helper">
          Lien direct : <code>http://127.0.0.1:8000/create-admin/</code>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
